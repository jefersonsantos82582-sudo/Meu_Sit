<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #2575fc;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1a5edb;
}

.result {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #222;
}
</style>
</head>

<body>

<div class="card">

<h1>🧮 Calculadora</h1>

<form method="POST">
    {% csrf_token %}

    <input name="x" type="number" step="any" placeholder="Primeiro número">
    <input name="y" type="number" step="any" placeholder="Segundo número">

    <select name="op">
        <option>+</option>
        <option>-</option>
        <option>*</option>
        <option>/</option>
        <option>**</option>
    </select>

    <button type="submit">Calcular</button>
</form>

<div class="result">
    Resultado: {{ resultado }}
</div>

</div>

</body>
</html>
